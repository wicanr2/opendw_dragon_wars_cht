<svg xmlns="http://www.w3.org/2000/svg" width="520" height="540" viewBox="0 0 520 540" font-family="sans-serif">
  <rect width="100%" height="100%" fill="#fbf9f4"/>

  <!-- outer forest border -->
  <g stroke="#222" stroke-width="3" stroke-linecap="square" fill="none">
    <rect x="20" y="20" width="480" height="430"/>
    <!-- treasure vault box top-left (7,8,9 area) -->
    <rect x="20" y="20" width="100" height="90"/>
    <line x1="120" y1="65" x2="160" y2="65"/>
  </g>

  <!-- scattered tree marks (decorative, light) -->
  <g stroke="#6b8e5a" stroke-width="2.2" fill="none" stroke-linecap="round">
    <!-- a simple tree glyph repeated: small Y/star -->
    <g>
      <path d="M150 95 l0 16 M142 100 l16 0 M145 96 l10 10 M155 96 l-10 10"/>
      <path d="M240 110 l0 16 M232 115 l16 0"/>
      <path d="M330 95 l0 16 M322 100 l16 0 M325 96 l10 10 M335 96 l-10 10"/>
      <path d="M420 100 l0 16 M412 105 l16 0"/>
      <path d="M190 160 l0 16 M182 165 l16 0 M185 161 l10 10 M195 161 l-10 10"/>
      <path d="M280 175 l0 16 M272 180 l16 0"/>
      <path d="M370 165 l0 16 M362 170 l16 0 M365 166 l10 10 M375 166 l-10 10"/>
      <path d="M110 200 l0 16 M102 205 l16 0"/>
      <path d="M160 250 l0 16 M152 255 l16 0 M155 251 l10 10 M165 251 l-10 10"/>
      <path d="M120 300 l0 16 M112 305 l16 0"/>
      <path d="M220 320 l0 16 M212 325 l16 0 M215 321 l10 10 M225 321 l-10 10"/>
      <path d="M120 380 l0 16 M112 385 l16 0"/>
      <path d="M200 400 l0 16 M192 405 l16 0 M195 401 l10 10 M205 401 l-10 10"/>
      <path d="M300 400 l0 16 M292 405 l16 0"/>
      <path d="M400 380 l0 16 M392 385 l16 0 M395 381 l10 10 M405 381 l-10 10"/>
      <path d="M450 250 l0 16 M442 255 l16 0"/>
      <path d="M440 160 l0 16 M432 165 l16 0 M435 161 l10 10 M445 161 l-10 10"/>
    </g>
  </g>

  <!-- central swamp blob (ancient shrine 4,5 area) -->
  <path d="M300 290 q-20 -20 10 -25 q40 -8 70 5 q35 5 30 35 q5 35 -25 45 q-30 20 -65 8 q-35 -3 -32 -38 q-8 -20 12 -30 z"
        fill="#5a5248" stroke="#222" stroke-width="2.5"/>
  <path d="M330 305 q25 -8 45 5 q18 18 0 40 q-30 12 -50 -3 q-12 -22 5 -42 z" fill="#fbf9f4"/>

  <!-- numbered points -->
  <g font-size="15" font-weight="bold" stroke="none">
    <!-- 8,9,7 inside vault -->
    <circle cx="55" cy="55" r="11" fill="#c0392b"/><text x="55" y="55" fill="#fff" text-anchor="middle" dominant-baseline="central">8</text>
    <circle cx="95" cy="55" r="11" fill="#c0392b"/><text x="95" y="55" fill="#fff" text-anchor="middle" dominant-baseline="central">9</text>
    <circle cx="45" cy="95" r="11" fill="#c0392b"/><text x="45" y="95" fill="#fff" text-anchor="middle" dominant-baseline="central">7</text>
    <!-- 1 top -->
    <circle cx="195" cy="60" r="11" fill="#c0392b"/><text x="195" y="60" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text>
    <!-- 11 top-right -->
    <circle cx="400" cy="65" r="11" fill="#c0392b"/><text x="400" y="65" fill="#fff" text-anchor="middle" dominant-baseline="central">11</text>
    <!-- 10 near 11 -->
    <circle cx="430" cy="55" r="11" fill="#c0392b"/><text x="430" y="55" fill="#fff" text-anchor="middle" dominant-baseline="central">10</text>
    <!-- 2 middle-left -->
    <circle cx="160" cy="230" r="11" fill="#c0392b"/><text x="160" y="230" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text>
    <!-- 3 (teleport ring) -->
    <circle cx="150" cy="290" r="11" fill="#c0392b"/><text x="150" y="290" fill="#fff" text-anchor="middle" dominant-baseline="central">3</text>
    <!-- 4,5 in swamp -->
    <circle cx="305" cy="335" r="11" fill="#c0392b"/><text x="305" y="335" fill="#fff" text-anchor="middle" dominant-baseline="central">4</text>
    <circle cx="350" cy="330" r="11" fill="#c0392b"/><text x="350" y="330" fill="#fff" text-anchor="middle" dominant-baseline="central">5</text>
    <!-- 6 lower-left -->
    <circle cx="110" cy="410" r="11" fill="#c0392b"/><text x="110" y="410" fill="#fff" text-anchor="middle" dominant-baseline="central">6</text>
  </g>

  <text x="260" y="490" text-anchor="middle" font-size="19" font-weight="bold" fill="#222">Mystic Wood 神祕林</text>
</svg>
