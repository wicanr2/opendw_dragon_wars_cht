<svg xmlns="http://www.w3.org/2000/svg" width="520" height="480" viewBox="0 0 520 480" font-family="Noto Sans CJK TC" font-size="15">
  <rect width="100%" height="100%" fill="#fbf9f4"/>
  <g stroke="#222" stroke-width="3" stroke-linecap="square" fill="none">
    <!-- outer -->
    <rect x="80" y="30" width="400" height="380"/>
    <!-- top wall notch / S -->
    <line x1="120" y1="30" x2="120" y2="70"/>
    <line x1="120" y1="70" x2="440" y2="70"/>
    <line x1="440" y1="30" x2="440" y2="70"/>
    <!-- central big block -->
    <rect x="160" y="110" width="240" height="160"/>
    <!-- inner rooms 9 8 7 -->
    <line x1="200" y1="110" x2="200" y2="170"/>
    <line x1="250" y1="110" x2="250" y2="170"/>
    <line x1="300" y1="110" x2="300" y2="170"/>
    <line x1="160" y1="170" x2="400" y2="170"/>
    <!-- room 10 left of block -->
    <line x1="160" y1="140" x2="120" y2="140"/>
    <!-- 11 inside lower -->
    <line x1="200" y1="170" x2="200" y2="230"/>
    <line x1="300" y1="170" x2="300" y2="230"/>
    <line x1="200" y1="230" x2="360" y2="230"/>
    <!-- room 6 left lower -->
    <line x1="80" y1="300" x2="160" y2="300"/>
    <line x1="160" y1="280" x2="160" y2="340"/>
    <!-- rooms 4 / 5 center lower -->
    <rect x="200" y="300" width="50" height="50"/>
    <line x1="250" y1="320" x2="320" y2="320"/>
    <!-- 1 / 2 entry bottom -->
    <line x1="200" y1="350" x2="200" y2="410"/>
    <line x1="200" y1="380" x2="240" y2="380"/>
    <!-- room 3 bottom right -->
    <rect x="330" y="350" width="60" height="50"/>
    <line x1="330" y1="375" x2="390" y2="375"/>
  </g>
  <!-- rocks left + lower -->
  <g fill="#cfcabb" stroke="none">
    <ellipse cx="55" cy="120" rx="13" ry="8"/><ellipse cx="55" cy="160" rx="13" ry="8"/>
    <ellipse cx="55" cy="200" rx="13" ry="8"/><ellipse cx="55" cy="350" rx="13" ry="8"/>
    <ellipse cx="120" cy="420" rx="13" ry="8"/><ellipse cx="170" cy="430" rx="13" ry="8"/>
    <ellipse cx="280" cy="430" rx="13" ry="8"/>
  </g>
  <g font-size="12" font-weight="bold" fill="#444"><text x="425" y="68" text-anchor="middle">S</text></g>
  <g font-weight="bold">
    <circle cx="180" cy="140" r="11" fill="#c0392b"/><text x="180" y="140" fill="#fff" text-anchor="middle" dominant-baseline="central">9</text>
    <circle cx="225" cy="140" r="11" fill="#c0392b"/><text x="225" y="140" fill="#fff" text-anchor="middle" dominant-baseline="central">8</text>
    <circle cx="275" cy="140" r="11" fill="#c0392b"/><text x="275" y="140" fill="#fff" text-anchor="middle" dominant-baseline="central">7</text>
    <circle cx="140" cy="150" r="11" fill="#c0392b"/><text x="140" y="150" fill="#fff" text-anchor="middle" dominant-baseline="central">10</text>
    <circle cx="280" cy="200" r="11" fill="#c0392b"/><text x="280" y="200" fill="#fff" text-anchor="middle" dominant-baseline="central">11</text>
    <circle cx="130" cy="320" r="11" fill="#c0392b"/><text x="130" y="320" fill="#fff" text-anchor="middle" dominant-baseline="central">6</text>
    <circle cx="225" cy="325" r="11" fill="#c0392b"/><text x="225" y="325" fill="#fff" text-anchor="middle" dominant-baseline="central">4</text>
    <circle cx="255" cy="310" r="11" fill="#c0392b"/><text x="255" y="310" fill="#fff" text-anchor="middle" dominant-baseline="central">5</text>
    <circle cx="215" cy="365" r="11" fill="#c0392b"/><text x="215" y="365" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text>
    <circle cx="215" cy="395" r="11" fill="#c0392b"/><text x="215" y="395" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text>
    <circle cx="360" cy="388" r="11" fill="#c0392b"/><text x="360" y="388" fill="#fff" text-anchor="middle" dominant-baseline="central">3</text>
  </g>
  <text x="280" y="456" text-anchor="middle" font-size="19" font-family="Noto Sans CJK TC" font-weight="bold" fill="#222">City of Byzanople 拜占儂市</text>
</svg>
