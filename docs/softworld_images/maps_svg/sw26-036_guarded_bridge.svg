<svg xmlns="http://www.w3.org/2000/svg" width="420" height="420" viewBox="0 0 420 420" font-family="sans-serif">
  <rect width="100%" height="100%" fill="#fbf9f4"/>

  <!-- two hatched bridge spans -->
  <!-- left-lower span -->
  <path d="M30 200 L150 200 L150 320 L30 320 Z" fill="#5a5248" stroke="#222" stroke-width="2.5"/>
  <!-- right-upper span -->
  <path d="M210 160 L360 160 L360 300 L210 300 Z" fill="#5a5248" stroke="#222" stroke-width="2.5"/>

  <g stroke="#222" stroke-width="3" stroke-linecap="square" fill="none">
    <!-- left column passage 1,2 -->
    <path d="M150 200 L150 360 M120 360 L180 360 M150 240 L150 240"/>
    <line x1="150" y1="360" x2="120" y2="360"/>
    <!-- 3 = guard at the gap between spans -->
    <line x1="180" y1="240" x2="210" y2="240"/>

    <!-- right-upper room cluster 4,5,6,7 -->
    <path d="M250 60 L250 160 M280 60 L280 110 M250 60 L320 60
             M280 110 L340 110 M340 110 L340 160
             M300 110 L300 160"/>
    <!-- weapon room 7 box -->
    <rect x="285" y="120" width="20" height="26"/>
  </g>

  <g font-size="15" font-weight="bold" stroke="none">
    <circle cx="150" cy="345" r="11" fill="#c0392b"/><text x="150" y="345" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text>
    <circle cx="110" cy="280" r="11" fill="#c0392b"/><text x="110" y="280" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text>
    <circle cx="195" cy="240" r="11" fill="#c0392b"/><text x="195" y="240" fill="#fff" text-anchor="middle" dominant-baseline="central">3</text>
    <circle cx="265" cy="75" r="11" fill="#c0392b"/><text x="265" y="75" fill="#fff" text-anchor="middle" dominant-baseline="central">4</text>
    <circle cx="330" cy="95" r="11" fill="#c0392b"/><text x="330" y="95" fill="#fff" text-anchor="middle" dominant-baseline="central">5</text>
    <circle cx="320" cy="135" r="11" fill="#c0392b"/><text x="320" y="135" fill="#fff" text-anchor="middle" dominant-baseline="central">6</text>
    <circle cx="270" cy="130" r="11" fill="#c0392b"/><text x="270" y="130" fill="#fff" text-anchor="middle" dominant-baseline="central">7</text>
  </g>

  <text x="210" y="400" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">Heavily Guarded Bridge 橋樑</text>
</svg>
