<svg xmlns="http://www.w3.org/2000/svg" width="420" height="360" viewBox="0 0 420 360" font-family="sans-serif">
  <rect width="100%" height="100%" fill="#fbf9f4"/>
  <g stroke="#222" stroke-width="3" stroke-linecap="square" fill="none">
    <!-- left block of small rooms -->
    <rect x="20" y="40" width="150" height="180"/>
    <line x1="20" y1="100" x2="100" y2="100"/>
    <line x1="100" y1="40" x2="100" y2="100"/>
    <line x1="60" y1="150" x2="170" y2="150"/>
    <line x1="20" y1="185" x2="90" y2="185"/>
    <!-- top corridor stub with stairs -->
    <line x1="95" y1="40" x2="95" y2="20"/>
    <!-- right large room -->
    <rect x="200" y="80" width="190" height="170"/>
    <!-- inner small room (point 1) -->
    <rect x="270" y="135" width="55" height="55"/>
    <!-- corridor connecting left block to right room -->
    <line x1="170" y1="130" x2="200" y2="130"/>
    <!-- top connector to right room with stairs -->
    <line x1="250" y1="80" x2="250" y2="55"/>
    <line x1="250" y1="55" x2="290" y2="55"/>
    <!-- bottom outer corridor -->
    <line x1="40" y1="290" x2="390" y2="290"/>
    <line x1="40" y1="290" x2="40" y2="250"/>
    <line x1="390" y1="290" x2="390" y2="250"/>
  </g>
  <!-- stairs markers -->
  <g font-size="13" font-weight="bold" fill="#222">
    <text x="95" y="34" text-anchor="middle">S</text>
    <text x="300" y="55" text-anchor="middle">S</text>
    <text x="333" y="165" text-anchor="middle">S</text>
  </g>
  <g font-size="15" font-weight="bold">
    <circle cx="297" cy="162" r="11" fill="#c0392b"/><text x="297" y="162" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text>
    <circle cx="230" cy="210" r="11" fill="#c0392b"/><text x="230" y="210" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text>
  </g>
  <text x="210" y="338" text-anchor="middle" font-size="19" font-weight="bold" fill="#222">Sunken Ruins (Above Water) 沈沒之城-陸上</text>
</svg>
