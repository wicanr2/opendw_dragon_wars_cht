<svg xmlns="http://www.w3.org/2000/svg" width="500" height="480" viewBox="0 0 500 480" font-family="Noto Sans CJK TC" font-size="15">
  <rect width="100%" height="100%" fill="#fbf9f4"/>
  <g stroke="#222" stroke-width="3" stroke-linecap="square" fill="none">
    <!-- outer -->
    <rect x="60" y="20" width="420" height="400"/>
    <!-- top-left entry corridor -->
    <line x1="100" y1="20" x2="100" y2="60"/>
    <line x1="100" y1="60" x2="160" y2="60"/>
    <!-- top rooms 9 / 6 / 8 / 7 -->
    <line x1="240" y1="20" x2="240" y2="120"/>
    <line x1="240" y1="60" x2="320" y2="60"/>
    <line x1="320" y1="20" x2="320" y2="120"/>
    <line x1="380" y1="40" x2="460" y2="40"/>
    <line x1="380" y1="40" x2="380" y2="120"/>
    <line x1="320" y1="120" x2="460" y2="120"/>
    <!-- left rooms 12 / 11 / 10 -->
    <rect x="120" y="150" width="80" height="50"/>
    <rect x="100" y="240" width="60" height="60"/>
    <rect x="180" y="240" width="70" height="55"/>
    <!-- middle-right room 4 -->
    <rect x="300" y="240" width="80" height="90"/>
    <line x1="300" y1="200" x2="380" y2="200"/>
    <line x1="380" y1="160" x2="380" y2="240"/>
    <!-- vertical spine -->
    <line x1="280" y1="150" x2="280" y2="360"/>
    <!-- bottom rooms 3 / 5 / 1 / 2 -->
    <line x1="200" y1="340" x2="280" y2="340"/>
    <line x1="200" y1="340" x2="200" y2="420"/>
    <rect x="220" y="350" width="50" height="50"/>
    <line x1="240" y1="400" x2="240" y2="420"/>
  </g>
  <!-- rocks left edge -->
  <g fill="#cfcabb" stroke="none">
    <ellipse cx="40" cy="170" rx="14" ry="9"/><ellipse cx="40" cy="200" rx="14" ry="9"/>
    <ellipse cx="40" cy="230" rx="14" ry="9"/><ellipse cx="40" cy="260" rx="14" ry="9"/>
    <ellipse cx="40" cy="290" rx="14" ry="9"/><ellipse cx="40" cy="380" rx="14" ry="9"/>
  </g>
  <g font-weight="bold">
    <circle cx="220" cy="45" r="11" fill="#c0392b"/><text x="220" y="45" fill="#fff" text-anchor="middle" dominant-baseline="central">9</text>
    <circle cx="300" cy="45" r="11" fill="#c0392b"/><text x="300" y="45" fill="#fff" text-anchor="middle" dominant-baseline="central">6</text>
    <circle cx="265" cy="90" r="11" fill="#c0392b"/><text x="265" y="90" fill="#fff" text-anchor="middle" dominant-baseline="central">8</text>
    <circle cx="410" cy="80" r="11" fill="#c0392b"/><text x="410" y="80" fill="#fff" text-anchor="middle" dominant-baseline="central">7</text>
    <circle cx="160" cy="175" r="11" fill="#c0392b"/><text x="160" y="175" fill="#fff" text-anchor="middle" dominant-baseline="central">12</text>
    <circle cx="215" cy="267" r="11" fill="#c0392b"/><text x="215" y="267" fill="#fff" text-anchor="middle" dominant-baseline="central">10</text>
    <circle cx="130" cy="270" r="11" fill="#c0392b"/><text x="130" y="270" fill="#fff" text-anchor="middle" dominant-baseline="central">11</text>
    <circle cx="340" cy="285" r="11" fill="#c0392b"/><text x="340" y="285" fill="#fff" text-anchor="middle" dominant-baseline="central">4</text>
    <circle cx="215" cy="360" r="11" fill="#c0392b"/><text x="215" y="360" fill="#fff" text-anchor="middle" dominant-baseline="central">3</text>
    <circle cx="245" cy="370" r="11" fill="#c0392b"/><text x="245" y="370" fill="#fff" text-anchor="middle" dominant-baseline="central">5</text>
    <circle cx="225" cy="408" r="11" fill="#c0392b"/><text x="225" y="408" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text>
    <circle cx="245" cy="408" r="11" fill="#c0392b"/><text x="245" y="408" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text>
  </g>
  <text x="270" y="456" text-anchor="middle" font-size="19" font-family="Noto Sans CJK TC" font-weight="bold" fill="#222">Siege Camp 軍營</text>
</svg>
