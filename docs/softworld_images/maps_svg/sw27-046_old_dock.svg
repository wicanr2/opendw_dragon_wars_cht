<svg xmlns="http://www.w3.org/2000/svg" width="420" height="320" viewBox="0 0 420 320" font-family="Noto Sans CJK TC, sans-serif">
  <rect width="100%" height="100%" fill="#fbf9f4"/>
  <g stroke="#222" stroke-width="3" stroke-linecap="square" fill="none">
    <rect x="20" y="20" width="380" height="260"/>
    <!-- two small rooms upper-middle (3 and 2) -->
    <rect x="190" y="60" width="60" height="60"/>
    <rect x="270" y="80" width="60" height="60"/>
    <!-- left open room with point 4 -->
    <line x1="120" y1="160" x2="120" y2="220"/>
    <line x1="120" y1="160" x2="160" y2="160"/>
    <line x1="160" y1="160" x2="160" y2="200"/>
    <!-- point 1 small alcove right -->
    <line x1="300" y1="200" x2="340" y2="200"/>
    <line x1="300" y1="200" x2="300" y2="230"/>
    <line x1="340" y1="200" x2="340" y2="230"/>
  </g>
  <g font-size="15" font-weight="bold">
    <circle cx="220" cy="90" r="11" fill="#c0392b"/>
    <text x="220" y="90" fill="#fff" text-anchor="middle" dominant-baseline="central">3</text>
    <circle cx="300" cy="110" r="11" fill="#c0392b"/>
    <text x="300" y="110" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text>
    <circle cx="140" cy="195" r="11" fill="#c0392b"/>
    <text x="140" y="195" fill="#fff" text-anchor="middle" dominant-baseline="central">4</text>
    <circle cx="320" cy="218" r="11" fill="#c0392b"/>
    <text x="320" y="218" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text>
  </g>
  <text x="210" y="306" text-anchor="middle" font-family="Noto Sans CJK TC" font-size="19" font-weight="bold" fill="#222">Old Dock 老碼頭</text>
</svg>
