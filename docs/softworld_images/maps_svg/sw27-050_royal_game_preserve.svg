<svg xmlns="http://www.w3.org/2000/svg" width="400" height="380" viewBox="0 0 400 380" font-family="sans-serif">
  <rect width="100%" height="100%" fill="#fbf9f4"/>
  <!-- outer border -->
  <rect x="20" y="20" width="360" height="320" stroke="#222" stroke-width="3" fill="none"/>
  <!-- diagonal rocky river band, top-center down to bottom-left -->
  <g>
    <path d="M205,30 L235,30 L235,120 L150,260 L120,330 L90,330 L150,250 L205,110 Z"
          fill="#8a8a8a" stroke="#222" stroke-width="2"/>
  </g>
  <!-- scattered trees (small marks) -->
  <g font-size="13" fill="#3a6b35">
    <text x="60" y="70">↟</text><text x="110" y="60">↟</text><text x="300" y="70">↟</text>
    <text x="330" y="110">↟</text><text x="70" y="140">↟</text><text x="280" y="150">↟</text>
    <text x="340" y="180">↟</text><text x="50" y="210">↟</text><text x="100" y="250">↟</text>
    <text x="270" y="230">↟</text><text x="310" y="280">↟</text><text x="60" y="300">↟</text>
    <text x="200" y="200">↟</text><text x="250" y="300">↟</text><text x="180" y="320">↟</text>
    <text x="340" y="300">↟</text><text x="40" y="100">↟</text><text x="360" y="240">↟</text>
  </g>
  <g font-size="15" font-weight="bold">
    <circle cx="200" cy="100" r="11" fill="#c0392b"/>
    <text x="200" y="100" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text>
    <circle cx="240" cy="100" r="11" fill="#c0392b"/>
    <text x="240" y="100" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text>
    <circle cx="110" cy="295" r="11" fill="#c0392b"/>
    <text x="110" y="295" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text>
  </g>
  <text x="200" y="366" text-anchor="middle" font-size="19" font-weight="bold" fill="#222">Royal Game Preserve 皇家專有獵區</text>
</svg>
