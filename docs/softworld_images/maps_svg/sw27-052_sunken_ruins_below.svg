<svg xmlns="http://www.w3.org/2000/svg" width="440" height="380" viewBox="0 0 440 380" font-family="sans-serif">
  <rect width="100%" height="100%" fill="#fbf9f4"/>
  <g stroke="#222" stroke-width="3" stroke-linecap="square" fill="none">
    <!-- left big room 2 -->
    <rect x="20" y="30" width="170" height="110"/>
    <!-- top-right room 3 -->
    <rect x="230" y="20" width="180" height="100"/>
    <line x1="310" y1="20" x2="310" y2="60"/>
    <line x1="300" y1="20" x2="320" y2="20"/>
    <!-- mid horizontal bars (broken walls) -->
    <line x1="110" y1="155" x2="240" y2="155"/>
    <line x1="20" y1="170" x2="90" y2="170"/>
    <line x1="290" y1="120" x2="290" y2="170"/>
    <line x1="290" y1="155" x2="400" y2="155"/>
    <!-- lower rooms -->
    <line x1="60" y1="200" x2="60" y2="280"/>
    <line x1="60" y1="280" x2="160" y2="280"/>
    <line x1="160" y1="200" x2="160" y2="280"/>
    <line x1="200" y1="210" x2="200" y2="300"/>
    <line x1="250" y1="210" x2="250" y2="300"/>
    <line x1="250" y1="260" x2="350" y2="260"/>
    <line x1="350" y1="200" x2="350" y2="300"/>
    <line x1="400" y1="200" x2="400" y2="300"/>
    <!-- bottom long room -->
    <rect x="200" y="310" width="210" height="40"/>
    <!-- door stubs -->
    <line x1="20" y1="350" x2="60" y2="350"/>
  </g>
  <!-- center funnel/portal (point 1) -->
  <g stroke="#222" stroke-width="2" fill="#dcd6c8">
    <polygon points="210,150 250,135 250,185 210,170"/>
  </g>
  <g font-size="15" font-weight="bold">
    <circle cx="235" cy="160" r="11" fill="#c0392b"/><text x="235" y="160" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text>
    <circle cx="100" cy="80" r="11" fill="#c0392b"/><text x="100" y="80" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text>
    <circle cx="390" cy="45" r="11" fill="#c0392b"/><text x="390" y="45" fill="#fff" text-anchor="middle" dominant-baseline="central">3</text>
  </g>
  <text x="220" y="372" text-anchor="middle" font-size="19" font-weight="bold" fill="#222">Sunken Ruins (Below Water) 沈沒之城-水下</text>
</svg>
