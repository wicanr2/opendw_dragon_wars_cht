<svg xmlns="http://www.w3.org/2000/svg" width="320" height="300" viewBox="0 0 320 300" font-family="sans-serif">
  <rect width="100%" height="100%" fill="#fbf9f4"/>
  <g stroke="#222" stroke-width="3" stroke-linecap="square" fill="none">
    <!-- two cells at top, joined by a vertical corridor -->
    <rect x="100" y="30" width="50" height="50"/>
    <rect x="170" y="30" width="50" height="50"/>
    <!-- door stubs -->
    <line x1="125" y1="80" x2="125" y2="100"/>
    <line x1="195" y1="80" x2="195" y2="100"/>
    <line x1="100" y1="55" x2="80" y2="55"/>
    <line x1="220" y1="55" x2="240" y2="55"/>
    <line x1="125" y1="100" x2="195" y2="100"/>
  </g>
  <!-- stone bridge band -->
  <g>
    <rect x="60" y="150" width="200" height="55" fill="#8a8a8a" stroke="#222" stroke-width="2"/>
    <g stroke="#444" stroke-width="2">
      <line x1="60" y1="165" x2="260" y2="165"/>
      <line x1="60" y1="190" x2="260" y2="190"/>
    </g>
    <text x="160" y="183" text-anchor="middle" font-size="14" fill="#222">~ ~ ~ ~ ~ ~</text>
  </g>
  <g font-size="15" font-weight="bold">
    <circle cx="160" cy="120" r="11" fill="#c0392b"/>
    <text x="160" y="120" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text>
  </g>
  <text x="160" y="286" text-anchor="middle" font-size="19" font-weight="bold" fill="#222">Scorpion Bridge 蠍橋</text>
</svg>
