<svg xmlns="http://www.w3.org/2000/svg" width="480" height="480" viewBox="0 0 480 480" font-family="sans-serif">
  <rect width="100%" height="100%" fill="#fbf9f4"/>
  <!-- rocky border ring (drawn as stone band frame) -->
  <g>
    <path d="M20,40 H460 V440 H20 Z M55,75 H425 V405 H55 Z" fill="#9a9a9a" stroke="#222" stroke-width="2" fill-rule="evenodd"/>
  </g>
  <!-- top rough/wavy band (entrance gully) -->
  <rect x="90" y="40" width="180" height="35" fill="#777" stroke="#222" stroke-width="2"/>
  <!-- inner playfield -->
  <rect x="55" y="75" width="370" height="330" fill="#fbf9f4" stroke="none"/>
  <!-- scattered rough-terrain stone pits -->
  <g fill="#cfc7b5" stroke="#7a7363" stroke-width="1.5">
    <rect x="110" y="105" width="34" height="34"/>
    <rect x="180" y="105" width="34" height="34"/>
    <rect x="250" y="105" width="34" height="34"/>
    <rect x="320" y="115" width="34" height="34"/>
    <rect x="95" y="170" width="34" height="34"/>
    <rect x="200" y="175" width="34" height="34"/>
    <rect x="300" y="180" width="34" height="34"/>
    <rect x="130" y="235" width="34" height="34"/>
    <rect x="230" y="240" width="34" height="34"/>
    <rect x="330" y="245" width="34" height="34"/>
    <rect x="100" y="300" width="34" height="34"/>
    <rect x="195" y="305" width="34" height="34"/>
    <rect x="290" y="310" width="34" height="34"/>
    <rect x="360" y="300" width="34" height="34"/>
  </g>
  <!-- a couple of boulders near bottom (markers) -->
  <g fill="#9a8f78" stroke="#5f5848" stroke-width="1.5">
    <circle cx="150" cy="345" r="9"/>
    <circle cx="245" cy="345" r="9"/>
  </g>
  <g font-size="15" font-weight="bold">
    <circle cx="180" cy="150" r="11" fill="#c0392b"/><text x="180" y="150" fill="#fff" text-anchor="middle" dominant-baseline="central">3</text>
    <circle cx="120" cy="355" r="11" fill="#c0392b"/><text x="120" y="355" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text>
    <circle cx="220" cy="355" r="11" fill="#c0392b"/><text x="220" y="355" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text>
  </g>
  <text x="240" y="466" text-anchor="middle" font-size="19" font-weight="bold" fill="#222">Dragon Valley 龍谷</text>
</svg>
