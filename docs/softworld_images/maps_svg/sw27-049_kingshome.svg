<svg xmlns="http://www.w3.org/2000/svg" width="480" height="460" viewBox="0 0 480 460" font-family="Noto Sans CJK TC" font-size="15">
  <rect width="100%" height="100%" fill="#fbf9f4"/>
  <g stroke="#222" stroke-width="3" stroke-linecap="square" fill="none">
    <!-- outer castle, top with crenellations simplified -->
    <rect x="40" y="60" width="400" height="340"/>
    <!-- top room 2 left -->
    <line x1="70" y1="120" x2="160" y2="120"/>
    <line x1="160" y1="60" x2="160" y2="160"/>
    <line x1="70" y1="120" x2="70" y2="160"/>
    <!-- top rooms 6 / 5 right -->
    <line x1="320" y1="60" x2="320" y2="160"/>
    <line x1="320" y1="120" x2="410" y2="120"/>
    <line x1="370" y1="60" x2="370" y2="120"/>
    <!-- central rooms -->
    <line x1="160" y1="160" x2="320" y2="160"/>
    <!-- 9 central small -->
    <rect x="200" y="190" width="80" height="80"/>
    <line x1="240" y1="160" x2="240" y2="190"/>
    <!-- 3 / 4 left -->
    <line x1="40" y1="200" x2="160" y2="200"/>
    <line x1="100" y1="200" x2="100" y2="300"/>
    <line x1="160" y1="200" x2="160" y2="300"/>
    <!-- 7 right -->
    <line x1="320" y1="200" x2="440" y2="200"/>
    <line x1="320" y1="200" x2="320" y2="300"/>
    <!-- 8 bottom corridor -->
    <line x1="100" y1="300" x2="380" y2="300"/>
    <line x1="240" y1="270" x2="240" y2="340"/>
    <!-- 10 bottom exit -->
    <line x1="200" y1="340" x2="280" y2="340"/>
    <line x1="200" y1="340" x2="200" y2="400"/>
    <line x1="280" y1="340" x2="280" y2="400"/>
  </g>
  <!-- top hatched wall band -->
  <g stroke="#aaa" stroke-width="2">
    <line x1="42" y1="40" x2="438" y2="40"/>
    <line x1="60" y1="30" x2="60" y2="58"/><line x1="120" y1="30" x2="120" y2="58"/>
    <line x1="180" y1="30" x2="180" y2="58"/><line x1="240" y1="30" x2="240" y2="58"/>
    <line x1="300" y1="30" x2="300" y2="58"/><line x1="360" y1="30" x2="360" y2="58"/>
    <line x1="420" y1="30" x2="420" y2="58"/>
  </g>
  <g font-weight="bold">
    <circle cx="100" cy="105" r="11" fill="#c0392b"/><text x="100" y="105" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text>
    <circle cx="350" cy="105" r="11" fill="#c0392b"/><text x="350" y="105" fill="#fff" text-anchor="middle" dominant-baseline="central">6</text>
    <circle cx="395" cy="105" r="11" fill="#c0392b"/><text x="395" y="105" fill="#fff" text-anchor="middle" dominant-baseline="central">5</text>
    <circle cx="70" cy="230" r="11" fill="#c0392b"/><text x="70" y="230" fill="#fff" text-anchor="middle" dominant-baseline="central">3</text>
    <circle cx="130" cy="230" r="11" fill="#c0392b"/><text x="130" y="230" fill="#fff" text-anchor="middle" dominant-baseline="central">4</text>
    <circle cx="240" cy="230" r="11" fill="#c0392b"/><text x="240" y="230" fill="#fff" text-anchor="middle" dominant-baseline="central">9</text>
    <circle cx="290" cy="240" r="11" fill="#c0392b"/><text x="290" y="240" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text>
    <circle cx="380" cy="230" r="11" fill="#c0392b"/><text x="380" y="230" fill="#fff" text-anchor="middle" dominant-baseline="central">7</text>
    <circle cx="240" cy="318" r="11" fill="#c0392b"/><text x="240" y="318" fill="#fff" text-anchor="middle" dominant-baseline="central">8</text>
    <circle cx="240" cy="385" r="11" fill="#c0392b"/><text x="240" y="385" fill="#fff" text-anchor="middle" dominant-baseline="central">10</text>
  </g>
  <text x="240" y="438" text-anchor="middle" font-size="19" font-family="Noto Sans CJK TC" font-weight="bold" fill="#222">Kingshome 京雄城</text>
</svg>
