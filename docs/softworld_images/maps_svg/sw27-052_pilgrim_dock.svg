<svg xmlns="http://www.w3.org/2000/svg" width="360" height="420" viewBox="0 0 360 420" font-family="sans-serif">
  <rect width="100%" height="100%" fill="#fbf9f4"/>
  <!-- water (rocky hatch) regions: top band and right/bottom margins -->
  <g fill="#8fa6b3" stroke="#6b7e8a" stroke-width="1">
    <rect x="20" y="20" width="320" height="70"/>
    <rect x="230" y="90" width="110" height="180"/>
    <rect x="20" y="310" width="320" height="40"/>
  </g>
  <g stroke="#222" stroke-width="3" stroke-linecap="square" fill="none">
    <!-- pier / ladder into water at top -->
    <rect x="120" y="95" width="40" height="35"/>
    <line x1="130" y1="95" x2="130" y2="60"/>
    <line x1="150" y1="95" x2="150" y2="60"/>
    <line x1="125" y1="72" x2="155" y2="72"/>
    <line x1="125" y1="82" x2="155" y2="82"/>
    <!-- upper room 2 -->
    <rect x="80" y="130" width="150" height="80"/>
    <!-- mid-left room 6 -->
    <line x1="40" y1="225" x2="40" y2="290"/>
    <line x1="40" y1="290" x2="230" y2="290"/>
    <line x1="40" y1="225" x2="120" y2="225"/>
    <!-- right room 3 -->
    <rect x="180" y="300" width="120" height="60"/>
    <line x1="200" y1="300" x2="200" y2="330"/>
    <line x1="240" y1="300" x2="240" y2="330"/>
    <!-- bottom-left room 4 -->
    <ellipse cx="55" cy="335" rx="35" ry="20"/>
    <line x1="90" y1="335" x2="120" y2="335"/>
  </g>
  <!-- stairs marker -->
  <text x="118" y="320" font-size="13" font-weight="bold" fill="#222" text-anchor="middle">S</text>
  <!-- NPC marker 5 -->
  <circle cx="270" cy="178" r="8" fill="#7a5a30" stroke="#4a3315" stroke-width="1.5"/>
  <g font-size="15" font-weight="bold">
    <circle cx="120" cy="170" r="11" fill="#c0392b"/><text x="120" y="170" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text>
    <circle cx="270" cy="200" r="11" fill="#c0392b"/><text x="270" y="200" fill="#fff" text-anchor="middle" dominant-baseline="central">5</text>
    <circle cx="55" cy="265" r="11" fill="#c0392b"/><text x="55" y="265" fill="#fff" text-anchor="middle" dominant-baseline="central">6</text>
    <circle cx="55" cy="335" r="11" fill="#c0392b"/><text x="55" y="335" fill="#fff" text-anchor="middle" dominant-baseline="central">4</text>
    <circle cx="220" cy="330" r="11" fill="#c0392b"/><text x="220" y="330" fill="#fff" text-anchor="middle" dominant-baseline="central">3</text>
  </g>
  <text x="180" y="400" text-anchor="middle" font-size="19" font-weight="bold" fill="#222">Pilgrim Dock 朝聖者碼頭</text>
</svg>
