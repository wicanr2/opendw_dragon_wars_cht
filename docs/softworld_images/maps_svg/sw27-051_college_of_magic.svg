<svg xmlns="http://www.w3.org/2000/svg" width="340" height="340" viewBox="0 0 340 340" font-family="sans-serif">
  <rect width="100%" height="100%" fill="#fbf9f4"/>
  <g stroke="#222" stroke-width="3" stroke-linecap="square" fill="none">
    <!-- outer wall, 3x4 room block -->
    <rect x="40" y="20" width="240" height="270"/>
    <!-- vertical interior walls (two columns) -->
    <line x1="120" y1="20" x2="120" y2="290"/>
    <line x1="200" y1="20" x2="200" y2="290"/>
    <!-- horizontal interior walls forming rows, with gaps as corridors -->
    <line x1="40" y1="90" x2="120" y2="90"/>
    <line x1="200" y1="90" x2="280" y2="90"/>
    <line x1="40" y1="160" x2="120" y2="160"/>
    <line x1="120" y1="130" x2="200" y2="130"/>
    <line x1="40" y1="225" x2="120" y2="225"/>
    <line x1="120" y1="225" x2="200" y2="225"/>
    <line x1="200" y1="200" x2="280" y2="200"/>
    <!-- door stubs on right outer wall -->
    <line x1="280" y1="120" x2="300" y2="120"/>
    <line x1="280" y1="180" x2="300" y2="180"/>
  </g>
  <!-- altars / fire markers -->
  <g fill="#b9701f" stroke="#8a4d12" stroke-width="1">
    <polygon points="70,115 80,130 60,130"/>
    <polygon points="70,185 80,200 60,200"/>
  </g>
  <g font-size="15" font-weight="bold">
    <circle cx="240" cy="50" r="11" fill="#c0392b"/><text x="240" y="50" fill="#fff" text-anchor="middle" dominant-baseline="central">9</text>
    <circle cx="160" cy="60" r="11" fill="#c0392b"/><text x="160" y="60" fill="#fff" text-anchor="middle" dominant-baseline="central">4</text>
    <circle cx="160" cy="110" r="11" fill="#c0392b"/><text x="160" y="110" fill="#fff" text-anchor="middle" dominant-baseline="central">3</text>
    <circle cx="160" cy="185" r="11" fill="#c0392b"/><text x="160" y="185" fill="#fff" text-anchor="middle" dominant-baseline="central">5</text>
    <circle cx="240" cy="170" r="11" fill="#c0392b"/><text x="240" y="170" fill="#fff" text-anchor="middle" dominant-baseline="central">8</text>
    <circle cx="240" cy="255" r="11" fill="#c0392b"/><text x="240" y="255" fill="#fff" text-anchor="middle" dominant-baseline="central">7</text>
    <circle cx="80" cy="255" r="11" fill="#c0392b"/><text x="80" y="255" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text>
    <circle cx="55" cy="280" r="11" fill="#c0392b"/><text x="55" y="280" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text>
  </g>
  <text x="170" y="322" text-anchor="middle" font-size="19" font-weight="bold" fill="#222">College of Magic 魔法學院</text>
</svg>
