<svg xmlns="http://www.w3.org/2000/svg" width="460" height="430" viewBox="0 0 460 430" font-family="sans-serif">
  <rect width="100%" height="100%" fill="#fbf9f4"/>
  <!-- 地下室小迷宮(門開口多,線段示意) -->
  <g stroke="#222" stroke-width="3" stroke-linecap="square" fill="none">
    <rect x="30" y="30" width="400" height="330"/>
    <!-- 上排房間 -->
    <line x1="100" y1="30" x2="100" y2="90"/>
    <line x1="150" y1="30" x2="150" y2="90"/>
    <line x1="100" y1="90" x2="220" y2="90"/>
    <line x1="220" y1="30" x2="220" y2="90"/>
    <line x1="290" y1="30" x2="290" y2="110"/>
    <!-- 左側 4 號房 -->
    <line x1="90" y1="120" x2="150" y2="120"/>
    <line x1="90" y1="120" x2="90" y2="170"/>
    <line x1="90" y1="170" x2="150" y2="170"/>
    <!-- 中央樓梯區 -->
    <line x1="170" y1="120" x2="170" y2="200"/>
    <line x1="260" y1="120" x2="260" y2="200"/>
    <line x1="170" y1="200" x2="260" y2="200"/>
    <!-- 右側 3 號房 -->
    <line x1="330" y1="120" x2="400" y2="120"/>
    <line x1="330" y1="120" x2="330" y2="170"/>
    <line x1="330" y1="170" x2="380" y2="170"/>
    <!-- 中下走廊 -->
    <line x1="120" y1="230" x2="300" y2="230"/>
    <line x1="120" y1="230" x2="120" y2="300"/>
    <line x1="200" y1="230" x2="200" y2="330"/>
    <line x1="300" y1="200" x2="300" y2="300"/>
    <line x1="350" y1="230" x2="350" y2="330"/>
    <line x1="60" y1="260" x2="60" y2="320"/>
    <!-- 2 號房下方 -->
    <line x1="200" y1="320" x2="260" y2="320"/>
    <line x1="260" y1="290" x2="260" y2="330"/>
  </g>
  <!-- 中央樓梯 -->
  <g stroke="#222" stroke-width="1.5" fill="#eee">
    <polygon points="200,130 240,130 270,180 200,180" fill="#eee" stroke="#222"/>
    <line x1="207" y1="140" x2="262" y2="140"/><line x1="204" y1="155" x2="266" y2="155"/><line x1="202" y1="168" x2="268" y2="168"/>
  </g>
  <!-- 編號點(含 S 樓梯標記) -->
  <g font-size="14" font-weight="bold">
    <g><circle cx="185" cy="60" r="11" fill="#c0392b"/><text x="185" y="60" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text></g>
    <g><circle cx="210" cy="60" r="11" fill="#888"/><text x="210" y="60" fill="#fff" text-anchor="middle" dominant-baseline="central">S</text></g>
    <g><circle cx="170" cy="320" r="11" fill="#c0392b"/><text x="170" y="320" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text></g>
    <g><circle cx="195" cy="320" r="11" fill="#888"/><text x="195" y="320" fill="#fff" text-anchor="middle" dominant-baseline="central">S</text></g>
    <g><circle cx="355" cy="145" r="11" fill="#c0392b"/><text x="355" y="145" fill="#fff" text-anchor="middle" dominant-baseline="central">3</text></g>
    <g><circle cx="380" cy="145" r="11" fill="#888"/><text x="380" y="145" fill="#fff" text-anchor="middle" dominant-baseline="central">S</text></g>
    <g><circle cx="115" cy="145" r="11" fill="#c0392b"/><text x="115" y="145" fill="#fff" text-anchor="middle" dominant-baseline="central">4</text></g>
    <g><circle cx="100" cy="125" r="11" fill="#888"/><text x="100" y="125" fill="#fff" text-anchor="middle" dominant-baseline="central">S</text></g>
  </g>
  <text x="200" y="400" text-anchor="middle" font-size="19" font-weight="bold" fill="#222">Tars Ruins (地下室)</text>
</svg>
