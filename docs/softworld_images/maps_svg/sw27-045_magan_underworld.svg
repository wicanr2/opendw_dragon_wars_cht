    <ellipse cx="100" cy="430" rx="12" ry="7"/><ellipse cx="180" cy="470" rx="12" ry="7"/>
    <ellipse cx="260" cy="500" rx="12" ry="7"/><ellipse cx="360" cy="470" rx="12" ry="7"/>
    <ellipse cx="450" cy="490" rx="12" ry="7"/><ellipse cx="560" cy="470" rx="12" ry="7"/>
    <ellipse cx="650" cy="450" rx="12" ry="7"/><ellipse cx="700" cy="300" rx="12" ry="7"/>
