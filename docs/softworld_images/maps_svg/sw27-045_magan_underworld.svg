    <line x1="320" y1="330" x2="360" y2="450"/>
    <line x1="360" y1="450" x2="450" y2="460"/>
  </g>
  <!-- a few wall fragments / structures -->
  <g stroke="#222" stroke-width="3" fill="none">
    <!-- structure near 15 (lower-left) -->
    <path d="M150 430 L150 380 L210 380 L210 410 L180 410 L180 430 Z"/>
    <!-- structure near 11 (mid-left) -->
    <rect x="240" y="290" width="60" height="50"/>
