    <circle cx="270" cy="315" r="12" fill="#c0392b"/><text x="270" y="315" fill="#fff" text-anchor="middle" dominant-baseline="central">11</text>
    <circle cx="540" cy="400" r="12" fill="#c0392b"/><text x="540" y="400" fill="#fff" text-anchor="middle" dominant-baseline="central">12</text>
    <circle cx="555" cy="160" r="12" fill="#c0392b"/><text x="555" y="160" fill="#fff" text-anchor="middle" dominant-baseline="central">13</text>
