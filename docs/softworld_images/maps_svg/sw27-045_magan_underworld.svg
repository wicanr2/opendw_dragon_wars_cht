    <circle cx="490" cy="330" r="12" fill="#c0392b"/><text x="490" y="330" fill="#fff" text-anchor="middle" dominant-baseline="central">4</text>
    <circle cx="340" cy="230" r="12" fill="#c0392b"/><text x="340" y="230" fill="#fff" text-anchor="middle" dominant-baseline="central">5</text>
    <circle cx="555" cy="240" r="12" fill="#c0392b"/><text x="555" y="240" fill="#fff" text-anchor="middle" dominant-baseline="central">6</text>
    <circle cx="650" cy="330" r="12" fill="#c0392b"/><text x="650" y="330" fill="#fff" text-anchor="middle" dominant-baseline="central">7</text>
