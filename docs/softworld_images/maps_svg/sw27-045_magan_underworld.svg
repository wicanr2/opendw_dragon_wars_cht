<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560" font-family="Noto Sans CJK TC" font-size="15">
  <rect width="100%" height="100%" fill="#fbf9f4"/>
  <!-- dark abyss region (right) -->
  <path d="M470 130 L640 130 L640 360 L560 360 L560 300 L480 300 L480 230 L470 230 Z"
        fill="#d9d4c8" stroke="#222" stroke-width="3"/>
  <!-- rocky scatter (light dots) suggesting open underworld -->
