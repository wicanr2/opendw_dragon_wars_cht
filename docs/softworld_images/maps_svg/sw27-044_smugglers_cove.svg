<svg xmlns="http://www.w3.org/2000/svg" width="420" height="360" viewBox="0 0 420 360" font-family="Noto Sans CJK TC">
  <rect width="100%" height="100%" fill="#fbf9f4"/>
  <!-- outer cave border -->
  <g stroke="#222" stroke-width="3" stroke-linecap="square" fill="none">
    <rect x="20" y="20" width="380" height="300"/>
    <!-- small structure lower-left -->
    <rect x="60" y="160" width="120" height="120"/>
    <!-- vertical corridor to point 2 -->
    <line x1="180" y1="160" x2="180" y2="110"/>
    <line x1="180" y1="110" x2="240" y2="110"/>
    <!-- inner room dividers -->
    <line x1="100" y1="160" x2="100" y2="220"/>
    <line x1="100" y1="220" x2="60" y2="220"/>
    <line x1="120" y1="200" x2="170" y2="200"/>
    <line x1="120" y1="200" x2="120" y2="240"/>
  </g>
  <!-- numbered points -->
  <g font-size="15" font-weight="bold">
    <circle cx="300" cy="70" r="11" fill="#c0392b"/>
    <text x="300" y="70" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text>
    <circle cx="200" cy="135" r="11" fill="#c0392b"/>
    <text x="200" y="135" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text>
    <circle cx="140" cy="225" r="11" fill="#c0392b"/>
    <text x="140" y="225" fill="#fff" text-anchor="middle" dominant-baseline="central">3</text>
    <circle cx="80" cy="195" r="11" fill="#c0392b"/>
    <text x="80" y="195" fill="#fff" text-anchor="middle" dominant-baseline="central">4</text>
    <circle cx="80" cy="240" r="11" fill="#c0392b"/>
    <text x="80" y="240" fill="#fff" text-anchor="middle" dominant-baseline="central">5</text>
  </g>
  <text x="210" y="346" text-anchor="middle" font-family="Noto Sans CJK TC" font-size="19" font-weight="bold" fill="#222">Smugglers Cove 海盜竊穴</text>
</svg>
