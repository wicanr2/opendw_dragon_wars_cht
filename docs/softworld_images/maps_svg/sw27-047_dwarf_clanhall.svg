<svg xmlns="http://www.w3.org/2000/svg" width="560" height="500" viewBox="0 0 560 500" font-family="Noto Sans CJK TC" font-size="15">
  <rect width="100%" height="100%" fill="#fbf9f4"/>
  <g stroke="#222" stroke-width="3" stroke-linecap="square" fill="none">
    <!-- outer -->
    <rect x="20" y="20" width="520" height="420"/>
    <!-- top row corridor with 9 / 4 (S markers) -->
    <line x1="20" y1="80" x2="240" y2="80"/>
    <line x1="120" y1="20" x2="120" y2="80"/>
    <line x1="180" y1="20" x2="180" y2="80"/>
    <!-- top-right rooms block (3) -->
    <line x1="260" y1="20" x2="260" y2="160"/>
    <line x1="260" y1="60" x2="460" y2="60"/>
    <line x1="380" y1="20" x2="380" y2="60"/>
    <line x1="460" y1="20" x2="460" y2="160"/>
    <line x1="260" y1="160" x2="460" y2="160"/>
    <!-- 6 / 5 connectors -->
    <line x1="220" y1="120" x2="320" y2="120"/>
    <line x1="220" y1="120" x2="220" y2="200"/>
    <line x1="280" y1="160" x2="280" y2="210"/>
    <line x1="240" y1="210" x2="340" y2="210"/>
    <!-- left vertical wall structure -->
    <line x1="60" y1="120" x2="60" y2="320"/>
    <line x1="60" y1="120" x2="120" y2="120"/>
    <line x1="120" y1="120" x2="120" y2="200"/>
    <!-- room 7 left -->
    <rect x="40" y="250" width="60" height="50"/>
    <!-- central pillars (8 / 2) -->
    <line x1="180" y1="240" x2="180" y2="420"/>
    <rect x="240" y="260" width="40" height="70"/>
    <rect x="300" y="260" width="40" height="70"/>
    <line x1="180" y1="330" x2="380" y2="330"/>
    <!-- right rooms / chest -->
    <line x1="420" y1="200" x2="500" y2="200"/>
    <line x1="420" y1="200" x2="420" y2="280"/>
    <line x1="420" y1="280" x2="500" y2="280"/>
    <line x1="440" y1="340" x2="500" y2="340"/>
    <line x1="440" y1="340" x2="440" y2="420"/>
    <line x1="300" y1="380" x2="380" y2="380"/>
    <line x1="300" y1="380" x2="300" y2="420"/>
  </g>
  <!-- chest glyph right -->
  <g stroke="#222" stroke-width="2" fill="none">
    <rect x="455" y="225" width="30" height="24"/>
    <line x1="455" y1="237" x2="485" y2="237"/>
  </g>
  <g font-size="12" font-weight="bold" fill="#444">
    <text x="70" y="78" text-anchor="middle">S</text>
    <text x="150" y="78" text-anchor="middle">S</text>
    <text x="210" y="78" text-anchor="middle">S</text>
  </g>
  <g font-weight="bold">
    <circle cx="45" cy="50" r="11" fill="#c0392b"/><text x="45" y="50" fill="#fff" text-anchor="middle" dominant-baseline="central">9</text>
    <circle cx="200" cy="50" r="11" fill="#c0392b"/><text x="200" y="50" fill="#fff" text-anchor="middle" dominant-baseline="central">4</text>
    <circle cx="360" cy="110" r="11" fill="#c0392b"/><text x="360" y="110" fill="#fff" text-anchor="middle" dominant-baseline="central">3</text>
    <circle cx="235" cy="140" r="11" fill="#c0392b"/><text x="235" y="140" fill="#fff" text-anchor="middle" dominant-baseline="central">6</text>
    <circle cx="265" cy="200" r="11" fill="#c0392b"/><text x="265" y="200" fill="#fff" text-anchor="middle" dominant-baseline="central">5</text>
    <circle cx="60" cy="275" r="11" fill="#c0392b"/><text x="60" y="275" fill="#fff" text-anchor="middle" dominant-baseline="central">7</text>
    <circle cx="150" cy="290" r="11" fill="#c0392b"/><text x="150" y="290" fill="#fff" text-anchor="middle" dominant-baseline="central">8</text>
    <circle cx="210" cy="300" r="11" fill="#c0392b"/><text x="210" y="300" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text>
    <circle cx="110" cy="380" r="11" fill="#c0392b"/><text x="110" y="380" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text>
  </g>
  <text x="280" y="468" text-anchor="middle" font-size="19" font-family="Noto Sans CJK TC" font-weight="bold" fill="#222">Dwarf Clanhall 矮人城堡</text>
</svg>
