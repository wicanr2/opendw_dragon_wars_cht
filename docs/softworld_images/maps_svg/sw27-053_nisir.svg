<svg xmlns="http://www.w3.org/2000/svg" width="600" height="620" viewBox="0 0 600 620" font-family="sans-serif">
  <rect width="100%" height="100%" fill="#fbf9f4"/>
  <!-- rocky border ring (boulder field frame) -->
  <g fill="#9a9a9a" stroke="#222" stroke-width="2" fill-rule="evenodd">
    <path d="M20,30 H580 V590 H20 Z M75,85 H525 V535 H75 Z"/>
  </g>
  <!-- dark hatched pit areas -->
  <g fill="#3a3a3a">
    <polygon points="250,250 320,250 320,330 250,330"/>
    <polygon points="360,360 525,360 525,535 360,535 360,420 420,420 420,360"/>
  </g>
  <g stroke="#222" stroke-width="3" stroke-linecap="square" fill="none">
    <!-- top entrance corridors -->
    <line x1="150" y1="85" x2="150" y2="160"/>
    <line x1="190" y1="85" x2="190" y2="120"/>
    <line x1="190" y1="120" x2="300" y2="120"/>
    <line x1="380" y1="85" x2="380" y2="140"/>
    <line x1="380" y1="140" x2="470" y2="140"/>
    <!-- left maze corridors -->
    <line x1="150" y1="160" x2="280" y2="160"/>
    <line x1="280" y1="160" x2="280" y2="250"/>
    <line x1="150" y1="200" x2="150" y2="300"/>
    <line x1="110" y1="200" x2="230" y2="200"/>
    <!-- room 4 -->
    <rect x="100" y="225" width="50" height="45"/>
    <!-- 3 / 2 connector rooms -->
    <line x1="180" y1="280" x2="280" y2="280"/>
    <line x1="180" y1="320" x2="280" y2="320"/>
    <line x1="180" y1="280" x2="180" y2="360"/>
    <line x1="280" y1="280" x2="280" y2="330"/>
    <!-- center-left chest room -->
    <rect x="140" y="370" width="70" height="60"/>
    <!-- 5 lower-center -->
    <line x1="250" y1="360" x2="250" y2="500"/>
    <line x1="250" y1="500" x2="340" y2="500"/>
    <line x1="340" y1="420" x2="340" y2="500"/>
    <!-- 6 top-right big room -->
    <rect x="400" y="180" width="120" height="120"/>
    <line x1="450" y1="300" x2="450" y2="330"/>
    <!-- 7 bottom-right room (inside pit) -->
    <rect x="440" y="430" width="70" height="80" stroke="#fff"/>
  </g>
  <!-- chest marker -->
  <rect x="160" y="390" width="30" height="22" fill="#cbb27a" stroke="#222" stroke-width="2"/>
  <g font-size="15" font-weight="bold">
    <circle cx="120" cy="247" r="11" fill="#c0392b"/><text x="120" y="247" fill="#fff" text-anchor="middle" dominant-baseline="central">4</text>
    <circle cx="215" cy="300" r="11" fill="#c0392b"/><text x="215" y="300" fill="#fff" text-anchor="middle" dominant-baseline="central">3</text>
    <circle cx="215" cy="340" r="11" fill="#c0392b"/><text x="215" y="340" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text>
    <circle cx="295" cy="470" r="11" fill="#c0392b"/><text x="295" y="470" fill="#fff" text-anchor="middle" dominant-baseline="central">5</text>
    <circle cx="460" cy="240" r="11" fill="#c0392b"/><text x="460" y="240" fill="#fff" text-anchor="middle" dominant-baseline="central">6</text>
    <circle cx="475" cy="470" r="11" fill="#c0392b"/><text x="475" y="470" fill="#fff" text-anchor="middle" dominant-baseline="central">7</text>
  </g>
  <text x="300" y="612" text-anchor="middle" font-size="19" font-weight="bold" fill="#222">Nisir 尼塞山</text>
</svg>
