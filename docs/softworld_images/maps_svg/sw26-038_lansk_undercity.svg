<svg xmlns="http://www.w3.org/2000/svg" width="580" height="580" viewBox="0 0 580 580" font-family="sans-serif">
  <rect width="100%" height="100%" fill="#fbf9f4"/>

  <g stroke="#222" stroke-width="3" stroke-linecap="square" fill="none">
    <!-- outer wall -->
    <rect x="60" y="50" width="460" height="460"/>

    <!-- top water/rubble strip (5 stairs) -->
  </g>
  <!-- top hatched strip -->
  <path d="M210 50 L370 50 L370 95 L210 95 Z" fill="#5a5248" stroke="#222" stroke-width="2.5"/>
  <g stroke="#222" stroke-width="3" stroke-linecap="square" fill="none">
    <!-- stairs down from strip (5) -->
    <path d="M278 95 L278 160 M290 95 L290 160 M302 95 L302 160
             M272 110 L308 110 M272 125 L308 125 M272 140 L308 140"/>

    <!-- central H structure -->
    <rect x="220" y="200" width="140" height="160"/>
    <line x1="220" y1="280" x2="360" y2="280"/>
    <path d="M255 200 L255 235 L325 235 L325 200 M255 360 L255 325 L325 325 L325 360"/>

    <!-- left rooms 3,4 -->
    <path d="M120 215 L185 215 M120 270 L185 270 M120 325 L185 325 M185 215 L185 325"/>
    <!-- door S left -->
    <rect x="113" y="345" width="14" height="18"/>

    <!-- right rooms 6,7,8 -->
    <path d="M395 200 L460 200 M395 240 L460 240 M395 285 L460 285 M395 330 L460 330 M395 200 L395 330"/>

    <!-- door 1 (left of central) -->
    <rect x="205" y="270" width="16" height="22"/>
    <!-- small door S near central bottom -->
    <rect x="345" y="285" width="13" height="16"/>

    <!-- 9 box right -->
    <rect x="415" y="370" width="30" height="24"/>

    <!-- bottom room row (between 12 and 13) -->
    <path d="M170 430 L170 470 M210 430 L210 470 M250 430 L250 470 M290 430 L290 470
             M330 430 L330 470 M370 430 L370 470 M410 430 L410 470
             M170 430 L410 430 M170 470 L410 470"/>
  </g>

  <!-- corner monster statues 10,11,12,13 -->
  <g fill="#5a5248" stroke="#222" stroke-width="2">
    <circle cx="100" cy="95" r="16"/>
    <circle cx="480" cy="95" r="16"/>
    <circle cx="100" cy="465" r="16"/>
    <circle cx="480" cy="465" r="16"/>
  </g>

  <g font-size="15" font-weight="bold" stroke="none">
    <circle cx="128" cy="95" r="11" fill="#c0392b"/><text x="128" y="95" fill="#fff" text-anchor="middle" dominant-baseline="central">10</text>
    <circle cx="285" cy="125" r="11" fill="#c0392b"/><text x="285" y="125" fill="#fff" text-anchor="middle" dominant-baseline="central">5</text>
    <circle cx="452" cy="95" r="11" fill="#c0392b"/><text x="452" y="95" fill="#fff" text-anchor="middle" dominant-baseline="central">11</text>
    <circle cx="425" cy="225" r="11" fill="#c0392b"/><text x="425" y="225" fill="#fff" text-anchor="middle" dominant-baseline="central">6</text>
    <circle cx="425" cy="265" r="11" fill="#c0392b"/><text x="425" y="265" fill="#fff" text-anchor="middle" dominant-baseline="central">7</text>
    <circle cx="425" cy="310" r="11" fill="#c0392b"/><text x="425" y="310" fill="#fff" text-anchor="middle" dominant-baseline="central">8</text>
    <circle cx="153" cy="242" r="11" fill="#c0392b"/><text x="153" y="242" fill="#fff" text-anchor="middle" dominant-baseline="central">4</text>
    <circle cx="153" cy="297" r="11" fill="#c0392b"/><text x="153" y="297" fill="#fff" text-anchor="middle" dominant-baseline="central">3</text>
    <circle cx="213" cy="281" r="11" fill="#c0392b"/><text x="213" y="281" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text>
    <circle cx="290" cy="248" r="11" fill="#c0392b"/><text x="290" y="248" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text>
    <circle cx="430" cy="382" r="11" fill="#c0392b"/><text x="430" y="382" fill="#fff" text-anchor="middle" dominant-baseline="central">9</text>
    <circle cx="128" cy="465" r="11" fill="#c0392b"/><text x="128" y="465" fill="#fff" text-anchor="middle" dominant-baseline="central">12</text>
    <circle cx="452" cy="465" r="11" fill="#c0392b"/><text x="452" y="465" fill="#fff" text-anchor="middle" dominant-baseline="central">13</text>
  </g>

  <text x="290" y="548" text-anchor="middle" font-size="20" font-weight="bold" fill="#222">Lansk Undercity 蘭斯克地下城</text>
</svg>
