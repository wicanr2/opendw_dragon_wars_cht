<svg xmlns="http://www.w3.org/2000/svg" width="440" height="440" viewBox="0 0 440 440" font-family="Noto Sans CJK TC" font-size="15">
  <rect width="100%" height="100%" fill="#fbf9f4"/>
  <g stroke="#222" stroke-width="3" stroke-linecap="square" fill="none">
    <!-- outer wall -->
    <rect x="20" y="20" width="400" height="360"/>
    <!-- top notch corridor (point 6 area) -->
    <line x1="160" y1="20" x2="160" y2="60"/>
    <line x1="160" y1="60" x2="200" y2="60"/>
    <line x1="200" y1="60" x2="200" y2="20"/>
    <!-- left corridor to point 1 -->
    <line x1="20" y1="90" x2="120" y2="90"/>
    <line x1="120" y1="90" x2="120" y2="130"/>
    <!-- top inner wall -->
    <line x1="150" y1="80" x2="320" y2="80"/>
    <line x1="150" y1="80" x2="150" y2="110"/>
    <line x1="320" y1="80" x2="320" y2="120"/>
    <!-- right corridor to point 2 -->
    <line x1="320" y1="170" x2="420" y2="170"/>
    <!-- central C-shaped maze (point 4 inside) -->
    <line x1="120" y1="130" x2="280" y2="130"/>
    <line x1="120" y1="130" x2="120" y2="250"/>
    <line x1="280" y1="130" x2="280" y2="250"/>
    <line x1="120" y1="250" x2="280" y2="250"/>
    <line x1="160" y1="170" x2="160" y2="250"/>
    <line x1="240" y1="170" x2="240" y2="250"/>
    <line x1="160" y1="170" x2="240" y2="170"/>
    <!-- left lower corridor to point 5 -->
    <line x1="20" y1="270" x2="80" y2="270"/>
    <line x1="80" y1="250" x2="80" y2="290"/>
  </g>
  <!-- chessboard graveyard pattern lower area -->
  <g fill="#cfcabb" stroke="none">
    <rect x="60" y="320" width="22" height="22"/><rect x="104" y="320" width="22" height="22"/>
    <rect x="82" y="342" width="22" height="22"/><rect x="38" y="342" width="22" height="22"/>
    <rect x="240" y="320" width="22" height="22"/><rect x="284" y="320" width="22" height="22"/>
    <rect x="328" y="320" width="22" height="22"/><rect x="262" y="342" width="22" height="22"/>
    <rect x="306" y="342" width="22" height="22"/><rect x="350" y="342" width="22" height="22"/>
  </g>
  <!-- S markers (stair) -->
  <g font-size="13" font-weight="bold" fill="#444">
    <text x="200" y="252" text-anchor="middle">S</text>
  </g>
  <g font-weight="bold">
    <circle cx="45" cy="105" r="11" fill="#c0392b"/><text x="45" y="105" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text>
    <circle cx="360" cy="170" r="11" fill="#c0392b"/><text x="360" y="170" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text>
    <circle cx="400" cy="135" r="11" fill="#c0392b"/><text x="400" y="135" fill="#fff" text-anchor="middle" dominant-baseline="central">3</text>
    <circle cx="200" cy="210" r="11" fill="#c0392b"/><text x="200" y="210" fill="#fff" text-anchor="middle" dominant-baseline="central">4</text>
    <circle cx="45" cy="270" r="11" fill="#c0392b"/><text x="45" y="270" fill="#fff" text-anchor="middle" dominant-baseline="central">5</text>
    <circle cx="180" cy="42" r="11" fill="#c0392b"/><text x="180" y="42" fill="#fff" text-anchor="middle" dominant-baseline="central">6</text>
  </g>
  <text x="220" y="408" text-anchor="middle" font-size="19" font-family="Noto Sans CJK TC" font-weight="bold" fill="#222">The Necropolis 奈羅波裡</text>
</svg>
