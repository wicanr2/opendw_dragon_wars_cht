<svg xmlns="http://www.w3.org/2000/svg" width="560" height="600" viewBox="0 0 560 600" font-family="sans-serif">
  <rect width="100%" height="100%" fill="#fbf9f4"/>
  <!-- 迷宮牆:外框 + 主要內牆(中度簡化) -->
  <g stroke="#222" stroke-width="3" stroke-linecap="square" fill="none">
    <!-- 外框 -->
    <rect x="30" y="30" width="500" height="500"/>
    <!-- 右側被地下世界(Apsu Waters)斜切的缺角 -->
    <line x1="430" y1="530" x2="530" y2="430"/>
    <!-- 上方橫向走廊 -->
    <line x1="30" y1="110" x2="300" y2="110"/>
    <line x1="360" y1="30" x2="360" y2="160"/>
    <line x1="120" y1="110" x2="120" y2="160"/>
    <line x1="200" y1="80" x2="260" y2="80"/>
    <line x1="200" y1="80" x2="200" y2="110"/>
    <line x1="260" y1="80" x2="260" y2="110"/>
    <!-- 左上房間群 -->
    <line x1="120" y1="160" x2="320" y2="160"/>
    <line x1="320" y1="110" x2="320" y2="220"/>
    <line x1="120" y1="220" x2="320" y2="220"/>
    <!-- 右上 -->
    <line x1="430" y1="100" x2="500" y2="100"/>
    <line x1="430" y1="100" x2="430" y2="180"/>
    <line x1="360" y1="160" x2="430" y2="160"/>
    <!-- 中央大廳邊界 -->
    <line x1="150" y1="280" x2="360" y2="280"/>
    <line x1="150" y1="280" x2="150" y2="380"/>
    <line x1="360" y1="220" x2="360" y2="380"/>
    <line x1="150" y1="380" x2="360" y2="380"/>
    <!-- 左側垂直走廊 -->
    <line x1="90" y1="160" x2="90" y2="460"/>
    <line x1="30" y1="280" x2="90" y2="280"/>
    <line x1="30" y1="380" x2="90" y2="380"/>
    <!-- 左下房間 -->
    <line x1="90" y1="420" x2="220" y2="420"/>
    <line x1="220" y1="420" x2="220" y2="500"/>
    <line x1="90" y1="460" x2="150" y2="460"/>
    <!-- 下方走廊 -->
    <line x1="150" y1="440" x2="150" y2="530"/>
    <line x1="260" y1="430" x2="260" y2="530"/>
    <line x1="150" y1="470" x2="260" y2="470"/>
    <!-- 右側走廊與房間 -->
    <line x1="430" y1="220" x2="500" y2="220"/>
    <line x1="430" y1="220" x2="430" y2="320"/>
    <line x1="430" y1="320" x2="500" y2="320"/>
    <line x1="360" y1="430" x2="430" y2="430"/>
    <line x1="430" y1="380" x2="430" y2="460"/>
    <!-- 底部入口 -->
    <line x1="300" y1="500" x2="360" y2="500"/>
    <line x1="300" y1="500" x2="300" y2="530"/>
  </g>
  <!-- 編號點:紅圓白字 -->
  <g font-size="14" font-weight="bold">
    <g><circle cx="155" cy="500" r="11" fill="#c0392b"/><text x="155" y="500" fill="#fff" text-anchor="middle" dominant-baseline="central">3</text></g>
    <g><circle cx="120" cy="430" r="11" fill="#c0392b"/><text x="120" y="430" fill="#fff" text-anchor="middle" dominant-baseline="central">4</text></g>
    <g><circle cx="145" cy="450" r="11" fill="#c0392b"/><text x="145" y="450" fill="#fff" text-anchor="middle" dominant-baseline="central">5</text></g>
    <g><circle cx="185" cy="295" r="11" fill="#c0392b"/><text x="185" y="295" fill="#fff" text-anchor="middle" dominant-baseline="central">6</text></g>
    <g><circle cx="55" cy="295" r="11" fill="#c0392b"/><text x="55" y="295" fill="#fff" text-anchor="middle" dominant-baseline="central">7</text></g>
    <g><circle cx="300" cy="520" r="11" fill="#c0392b"/><text x="300" y="520" fill="#fff" text-anchor="middle" dominant-baseline="central">8</text></g>
    <g><circle cx="200" cy="200" r="11" fill="#c0392b"/><text x="200" y="200" fill="#fff" text-anchor="middle" dominant-baseline="central">9</text></g>
    <g><circle cx="230" cy="125" r="11" fill="#c0392b"/><text x="230" y="125" fill="#fff" text-anchor="middle" dominant-baseline="central">10</text></g>
    <g><circle cx="420" cy="200" r="11" fill="#c0392b"/><text x="420" y="200" fill="#fff" text-anchor="middle" dominant-baseline="central">11</text></g>
    <g><circle cx="485" cy="200" r="11" fill="#c0392b"/><text x="485" y="200" fill="#fff" text-anchor="middle" dominant-baseline="central">12</text></g>
    <g><circle cx="490" cy="400" r="11" fill="#c0392b"/><text x="490" y="400" fill="#fff" text-anchor="middle" dominant-baseline="central">13</text></g>
    <g><circle cx="330" cy="190" r="11" fill="#c0392b"/><text x="330" y="190" fill="#fff" text-anchor="middle" dominant-baseline="central">14</text></g>
    <g><circle cx="490" cy="60" r="11" fill="#c0392b"/><text x="490" y="60" fill="#fff" text-anchor="middle" dominant-baseline="central">15</text></g>
    <g><circle cx="265" cy="510" r="11" fill="#c0392b"/><text x="265" y="510" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text></g>
    <g><circle cx="320" cy="510" r="11" fill="#c0392b"/><text x="320" y="510" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text></g>
  </g>
  <text x="280" y="582" text-anchor="middle" font-size="19" font-weight="bold" fill="#222">Purgatory (波卡城)</text>
</svg>
