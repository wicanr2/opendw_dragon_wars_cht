<svg xmlns="http://www.w3.org/2000/svg" width="300" height="380" viewBox="0 0 300 380" font-family="Noto Sans CJK TC, sans-serif">
  <rect width="100%" height="100%" fill="#fbf9f4"/>
  <g stroke="#222" stroke-width="3" stroke-linecap="square" fill="none">
    <rect x="20" y="20" width="260" height="320"/>
    <!-- top land mass edge -->
    <line x1="100" y1="90" x2="200" y2="90"/>
    <!-- bridge structure (central, vertical) -->
    <line x1="110" y1="130" x2="110" y2="200"/>
    <line x1="190" y1="130" x2="190" y2="200"/>
    <line x1="110" y1="130" x2="190" y2="130"/>
    <line x1="110" y1="200" x2="190" y2="200"/>
    <!-- bottom land mass edge -->
    <line x1="100" y1="240" x2="200" y2="240"/>
  </g>
  <g font-size="15" font-weight="bold">
    <circle cx="140" cy="165" r="11" fill="#c0392b"/>
    <text x="140" y="165" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text>
    <circle cx="170" cy="165" r="11" fill="#c0392b"/>
    <text x="170" y="165" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text>
  </g>
  <text x="150" y="366" text-anchor="middle" font-family="Noto Sans CJK TC" font-size="19" font-weight="bold" fill="#222">Bridge of Exiles 放逐橋</text>
</svg>
