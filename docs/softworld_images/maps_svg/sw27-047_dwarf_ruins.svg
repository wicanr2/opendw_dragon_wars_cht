<svg xmlns="http://www.w3.org/2000/svg" width="400" height="320" viewBox="0 0 400 320" font-family="Noto Sans CJK TC, sans-serif">
  <rect width="100%" height="100%" fill="#fbf9f4"/>
  <!-- open rocky ruins: ladder/structure at left, statue at center -->
  <g stroke="#222" stroke-width="3" stroke-linecap="square" fill="none">
    <!-- ladder/passage structure (point 2) left -->
    <rect x="50" y="120" width="120" height="40"/>
    <line x1="80" y1="120" x2="80" y2="160"/>
    <line x1="110" y1="120" x2="110" y2="160"/>
    <line x1="140" y1="120" x2="140" y2="160"/>
  </g>
  <g font-size="15" font-weight="bold">
    <circle cx="70" cy="140" r="11" fill="#c0392b"/>
    <text x="70" y="140" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text>
    <circle cx="240" cy="150" r="11" fill="#c0392b"/>
    <text x="240" y="150" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text>
  </g>
  <text x="200" y="300" text-anchor="middle" font-family="Noto Sans CJK TC" font-size="19" font-weight="bold" fill="#222">Dwarf Ruins 矮人廢墟</text>
</svg>
