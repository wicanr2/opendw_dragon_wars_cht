<svg xmlns="http://www.w3.org/2000/svg" width="500" height="460" viewBox="0 0 500 460" font-family="Noto Sans CJK TC" font-size="15">
  <rect width="100%" height="100%" fill="#fbf9f4"/>
  <g stroke="#222" stroke-width="3" stroke-linecap="square" fill="none">
    <rect x="30" y="40" width="440" height="360"/>
    <!-- left cell block 1 (row of cells) -->
    <rect x="60" y="80" width="60" height="220"/>
    <line x1="60" y1="135" x2="120" y2="135"/>
    <line x1="60" y1="190" x2="120" y2="190"/>
    <line x1="60" y1="245" x2="120" y2="245"/>
    <!-- corridor 2 -->
    <line x1="160" y1="80" x2="160" y2="300"/>
    <line x1="120" y1="110" x2="160" y2="110"/>
    <line x1="120" y1="165" x2="160" y2="165"/>
    <line x1="120" y1="220" x2="160" y2="220"/>
    <line x1="120" y1="275" x2="160" y2="275"/>
    <!-- room 3 top middle (multi rooms) -->
    <rect x="240" y="60" width="140" height="100"/>
    <line x1="290" y1="60" x2="290" y2="160"/>
    <line x1="330" y1="60" x2="330" y2="160"/>
    <line x1="240" y1="110" x2="380" y2="110"/>
    <!-- room 4 small central -->
    <rect x="250" y="200" width="50" height="50"/>
    <!-- corridor down to 5 -->
    <line x1="160" y1="300" x2="280" y2="300"/>
    <line x1="220" y1="280" x2="220" y2="340"/>
    <!-- right corridor to 7 (top) -->
    <line x1="380" y1="160" x2="430" y2="160"/>
    <line x1="430" y1="60" x2="430" y2="200"/>
    <!-- 6 bottom right room -->
    <rect x="380" y="290" width="80" height="80"/>
  </g>
  <g font-size="12" font-weight="bold" fill="#444">
    <text x="425" y="80" text-anchor="middle">S</text>
    <text x="420" y="300" text-anchor="middle">S</text>
    <text x="305" y="230" text-anchor="middle">S</text>
  </g>
  <g font-weight="bold">
    <circle cx="90" cy="105" r="11" fill="#c0392b"/><text x="90" y="105" fill="#fff" text-anchor="middle" dominant-baseline="central">1</text>
    <circle cx="140" cy="140" r="11" fill="#c0392b"/><text x="140" y="140" fill="#fff" text-anchor="middle" dominant-baseline="central">2</text>
    <circle cx="310" cy="90" r="11" fill="#c0392b"/><text x="310" y="90" fill="#fff" text-anchor="middle" dominant-baseline="central">3</text>
    <circle cx="275" cy="225" r="11" fill="#c0392b"/><text x="275" y="225" fill="#fff" text-anchor="middle" dominant-baseline="central">4</text>
    <circle cx="210" cy="312" r="11" fill="#c0392b"/><text x="210" y="312" fill="#fff" text-anchor="middle" dominant-baseline="central">5</text>
    <circle cx="420" cy="330" r="11" fill="#c0392b"/><text x="420" y="330" fill="#fff" text-anchor="middle" dominant-baseline="central">6</text>
    <circle cx="450" cy="80" r="11" fill="#c0392b"/><text x="450" y="80" fill="#fff" text-anchor="middle" dominant-baseline="central">7</text>
  </g>
  <text x="250" y="438" text-anchor="middle" font-size="19" font-family="Noto Sans CJK TC" font-weight="bold" fill="#222">Kingshome Dungeon 京雄城地牢</text>
</svg>
