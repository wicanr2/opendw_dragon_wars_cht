name: CI

# opendw_remake 自動回歸:乾淨 ubuntu + SDL deps → cmake build → ctest。
# 與本機 docker dwsdl 流程一致(已在 ubuntu:24.04 容器驗證 ctest 10/10)。
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: opendw_remake
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential cmake \
            libsdl2-dev libsdl2-ttf-dev fonts-wqy-zenhei

      - name: Configure
        run: cmake -S . -B build_ci -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build_ci -j"$(nproc)"

      - name: Test (ctest)
        # smoke_app 自設 SDL_VIDEODRIVER=dummy;文字層字型走 fonts-wqy-zenhei 預設路徑。
        run: ctest --test-dir build_ci --output-on-failure
